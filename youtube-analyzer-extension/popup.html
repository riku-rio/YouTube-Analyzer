<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Analyzer</title>
  <link rel="stylesheet" href="popup.css">
  <script src="lib/marked.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>YouTube Analyzer</h1>
      <a href="settings.html" class="settings-link" title="Settings">⚙️</a>
    </header>

    <div class="input-section">
      <input type="text" id="videoUrl" placeholder="Paste YouTube URL here..." autocomplete="off">
      <button id="analyzeBtn">Analyze</button>
    </div>

    <div id="loadingIndicator" class="loading hidden">
      <div class="spinner"></div>
      <p>Analyzing...</p>
    </div>

    <div id="errorMessage" class="error hidden"></div>

    <div id="thumbnailSection" class="results hidden">
      <a id="thumbnailLink" href="" target="_blank" rel="noopener">
        <img id="thumbnailDisplay" class="thumbnail-display" alt="Video thumbnail">
      </a>
    </div>

    <div id="results" class="results hidden">
      <div id="analysisContent"></div>
    </div>

    <div id="thumbnailAnalysisSection" class="results hidden">
      <h3>Thumbnail Analysis</h3>
      <div id="thumbnailAnalysisContent"></div>
    </div>

    <div id="finalSummarySection" class="results hidden">
      <h3>Final Summary</h3>
      <div id="finalSummaryContent"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
